<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta name="google-site-verification" content="HTvYztTztqEIahskEYErq7mh0QlDY19aKHCwZKlEzl0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS AI</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #050505; --panel: rgba(14, 14, 18, 0.86); --panel-strong: rgba(18, 18, 24, 0.96);
      --border: rgba(255, 255, 255, 0.09); --text: #ffffff; --muted: rgba(255, 255, 255, 0.62);
      --soft: rgba(255, 255, 255, 0.08); --accent: #7c3aed; --accent-2: #06b6d4;
      --danger: #ef4444; --user: linear-gradient(135deg, #2563eb, #7c3aed); --bot: linear-gradient(135deg, #1f2937, #111827);
    }
    body.light {
      --bg: #f5f5f7; --panel: rgba(255, 255, 255, 0.82); --panel-strong: rgba(255, 255, 255, 0.96);
      --border: rgba(0, 0, 0, 0.1); --text: #101014; --muted: rgba(0, 0, 0, 0.58);
      --soft: rgba(0, 0, 0, 0.06); --bot: linear-gradient(135deg, #ffffff, #f2f2f5);
    }
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: Arial, Tahoma, sans-serif; }
    #grokCanvas { position: fixed; inset: 0; width: 100%; height: 100%; z-index: 0; background: radial-gradient(circle at center, #111827 0%, #050505 55%, #000 100%); }
    .app-shell { position: relative; z-index: 2; width: 100%; height: 100vh; display: flex; flex-direction: row; }
    .main-chat { flex: 1; min-width: 0; height: 100vh; display: flex; flex-direction: column; background: linear-gradient(180deg, rgba(5, 5, 8, 0.38), rgba(5, 5, 8, 0.72)); }
    .topbar { height: 64px; display: flex; align-items: center; justify-content: space-between; padding: 0 18px; border-bottom: 1px solid var(--border); background: rgba(5, 5, 8, 0.42); backdrop-filter: blur(16px); }
    .top-left { direction: ltr; display: flex; align-items: center; gap: 10px; }
    .model-pill { display: flex; align-items: center; gap: 8px; padding: 9px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--soft); font-size: 14px; }
    .model-dot { width: 9px; height: 9px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent-2)); box-shadow: 0 0 16px rgba(124, 58, 237, 0.9); }
    .top-action { border: 1px solid var(--border); background: var(--soft); color: var(--text); border-radius: 999px; padding: 9px 12px; cursor: pointer; }
    .brand { display: flex; flex-direction: column; align-items: flex-end; }
    .brand-title { font-weight: 800; color: #fff; }
    .brand-subtitle { font-size: 12px; color: var(--muted); }
    .content { flex: 1; min-height: 0; display: flex; flex-direction: column; }
    #auth { width: min(400px, 90%); margin: auto; padding: 25px; border: 1px solid var(--border); border-radius: 24px; background: var(--panel); backdrop-filter: blur(20px); display: flex; flex-direction: column; gap: 15px; }
    #auth input, #msgInput { width: 100%; border: 1px solid var(--border); background: rgba(255, 255, 255, 0.07); color: var(--text); border-radius: 12px; padding: 12px; }
    .primary-btn { border: none; border-radius: 12px; padding: 14px; color: white; background: linear-gradient(135deg, var(--accent), var(--accent-2)); cursor: pointer; font-weight: bold; }
    #chat { flex: 1; overflow-y: auto; padding: 20px; display: none; flex-direction: column; gap: 15px; }
    .msg { max-width: 85%; padding: 12px; border-radius: 15px; line-height: 1.6; word-break: break-word; }
    .msg.user { align-self: flex-end; background: var(--user); color: white; }
    .msg.bot { align-self: flex-start; background: var(--bot); border: 1px solid var(--border); }
    #inputArea { display: none; padding: 15px; background: rgba(5, 5, 8, 0.5); }
    .input-wrap { width: min(800px, 100%); margin: 0 auto; display: flex; gap: 10px; }
    .sidebar { width: 280px; height: 100vh; border-left: 1px solid var(--border); background: var(--panel-strong); display: flex; flex-direction: column; padding: 15px; gap: 10px; }
    @media (max-width: 860px) {
      .sidebar { position: fixed; right: 0; transform: translateX(100%); transition: 0.3s; z-index: 100; }
      body.sidebar-open .sidebar { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <canvas id="grokCanvas"></canvas>
  <div class="app-shell">
    <main class="main-chat">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">ATLAS AI</div>
        </div>
        <div class="top-left">
          <button class="top-action" onclick="toggleSidebar()">☰</button>
          <div class="model-pill"><span class="model-dot"></span><span>Atlas Chat</span></div>
          <button class="top-action" onclick="newChat()">New</button>
        </div>
      </header>
      <section class="content">
        <div id="auth">
          <h2 style="text-align:center">ورود</h2>
          <input id="email" type="email" placeholder="ایمیل" />
          <input id="password" type="password" placeholder="رمز عبور" />
          <button class="primary-btn" onclick="login()">ورود / ثبت‌نام</button>
        </div>
        <div id="chat"></div>
        <div id="inputArea">
          <div class="input-wrap">
            <input id="msgInput" type="text" placeholder="پیام..." onkeydown="if(event.key==='Enter')send()" />
            <button onclick="generateImage()" style="background:var(--accent); border:none; border-radius:10px; color:white; padding:0 10px">🎨</button>
            <button onclick="send()" style="background:var(--accent-2); border:none; border-radius:10px; color:white; padding:0 15px">➤</button>
          </div>
        </div>
      </section>
    </main>
    <aside class="sidebar">
      <button class="primary-btn" onclick="newChat()">＋ چت جدید</button>
      <div id="userChip" style="padding:10px; font-size:12px; color:var(--muted)">وارد نشده‌اید</div>
      <button class="primary-btn" style="background:var(--danger)" onclick="logout()">خروج</button>
    </aside>
  </div>

  <script>
/* =========================
   ATLAS AI ORIGINAL THEME PATCH
   ========================= */

* {
  box-sizing: border-box;
}

:root {
  --bg: #050505;
  --panel: rgba(14, 14, 18, 0.86);
  --panel-strong: rgba(18, 18, 24, 0.96);
  --border: rgba(255, 255, 255, 0.09);
  --text: #ffffff;
  --muted: rgba(255, 255, 255, 0.62);
  --soft: rgba(255, 255, 255, 0.08);
  --accent: #7c3aed;
  --accent-2: #06b6d4;
  --danger: #ef4444;
  --user: linear-gradient(135deg, #2563eb, #7c3aed);
  --bot: linear-gradient(135deg, #1f2937, #111827);
}

html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: Arial, Tahoma, sans-serif;
}

#grokCanvas {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  background:
    radial-gradient(circle at center, #111827 0%, #050505 55%, #000 100%);
}

.app-shell {
  position: relative;
  z-index: 2;
  width: 100%;
  height: 100vh;
  display: flex;
  flex-direction: row;
}

.main-chat {
  flex: 1;
  min-width: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(
      180deg,
      rgba(5, 5, 8, 0.38),
      rgba(5, 5, 8, 0.72)
    );
}

.topbar {
  height: 64px;
  min-height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(5, 5, 8, 0.42);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}

.top-left {
  direction: ltr;
  display: flex;
  align-items: center;
  gap: 10px;
}

.brand {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}

.brand-title {
  font-weight: 800;
  color: #fff;
  letter-spacing: 0.5px;
}

.brand-subtitle {
  font-size: 12px;
  color: var(--muted);
}

.model-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 9px 12px;
  border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--soft);
  font-size: 14px;
  color: var(--text);
}

.model-dot {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  box-shadow: 0 0 16px rgba(124, 58, 237, 0.9);
}

.top-action,
.side-btn {
  border: 1px solid var(--border);
  background: var(--soft);
  color: var(--text);
  border-radius: 999px;
  padding: 9px 12px;
  cursor: pointer;
  transition: 0.2s ease;
}

.top-action:hover,
.side-btn:hover {
  background: rgba(255, 255, 255, 0.13);
}

.content {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

#auth {
  width: min(400px, 90%);
  margin: auto;
  padding: 25px;
  border: 1px solid var(--border);
  border-radius: 24px;
  background: var(--panel);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  gap: 15px;
  box-shadow: 0 25px 80px rgba(0, 0, 0, 0.45);
}

#auth h2 {
  margin: 0 0 8px;
  text-align: center;
  color: #fff;
}

#auth input,
#msgInput {
  width: 100%;
  border: 1px solid var(--border);
  background: rgba(255, 255, 255, 0.07);
  color: var(--text);
  border-radius: 12px;
  padding: 12px;
  outline: none;
}

#auth input:focus,
#msgInput:focus {
  border-color: rgba(124, 58, 237, 0.65);
  box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.16);
}

#auth input::placeholder,
#msgInput::placeholder {
  color: rgba(255, 255, 255, 0.45);
}

.primary-btn {
  border: none;
  border-radius: 12px;
  padding: 14px;
  color: white;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s ease;
}

.primary-btn:hover {
  filter: brightness(1.08);
  transform: translateY(-1px);
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: none;
  flex-direction: column;
  gap: 15px;
}

.msg {
  max-width: 85%;
  padding: 12px 14px;
  border-radius: 15px;
  line-height: 1.6;
  word-break: break-word;
  white-space: pre-wrap;
}

.msg.user {
  align-self: flex-end;
  background: var(--user);
  color: white;
  border-bottom-right-radius: 5px;
}

.msg.bot {
  align-self: flex-start;
  background: var(--bot);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 5px;
}

.msg.system {
  align-self: center;
  max-width: 92%;
  background: rgba(255, 255, 255, 0.07);
  border: 1px solid var(--border);
  color: var(--muted);
  text-align: center;
}

#inputArea {
  display: none;
  padding: 15px;
  background: rgba(5, 5, 8, 0.5);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.input-wrap {
  width: min(800px, 100%);
  margin: 0 auto;
  display: flex;
  gap: 10px;
  align-items: center;
}

.input-wrap button,
#imgBtn {
  border: none;
  border-radius: 10px;
  color: white;
  padding: 0 15px;
  min-height: 44px;
  cursor: pointer;
}

#imgBtn {
  background: var(--accent);
}

.input-wrap button:last-child {
  background: var(--accent-2);
}

.sidebar {
  width: 280px;
  height: 100vh;
  border-left: 1px solid var(--border);
  background: var(--panel-strong);
  display: flex;
  flex-direction: column;
  padding: 15px;
  gap: 10px;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
}

.user-chip {
  padding: 12px;
  font-size: 12px;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 14px;
  background: rgba(255, 255, 255, 0.06);
  word-break: break-word;
}

.sidebar-footer {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.logout-btn {
  background: var(--danger) !important;
}

@media (max-width: 860px) {
  .sidebar {
    position: fixed;
    top: 0;
    right: 0;
    transform: translateX(100%);
    transition: 0.3s ease;
    z-index: 100;
  }

  body.sidebar-open .sidebar {
    transform: translateX(0);
  }
}
  </script>
</body>
</html>
