<script>
const canvas = document.getElementById("grokCanvas");
const ctx = canvas.getContext("2d");

let particles=[];
let t=0;
let burst=0;

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
window.addEventListener("resize",resize);
resize();

/* nebula background */
function drawNebula(){

let g=ctx.createRadialGradient(
canvas.width*0.7,
canvas.height*0.3,
0,
canvas.width*0.7,
canvas.height*0.3,
canvas.width
);

g.addColorStop(0,"rgba(80,120,255,0.15)");
g.addColorStop(0.4,"rgba(140,60,255,0.12)");
g.addColorStop(0.7,"rgba(0,0,0,0)");
g.addColorStop(1,"rgba(0,0,0,0)");

ctx.fillStyle=g;
ctx.fillRect(0,0,canvas.width,canvas.height);

}

/* particle */

class Particle{

constructor(){
this.reset(true);
}

reset(first=false){

this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;

if(!first){

if(Math.random()<0.5){
this.x=canvas.width+50;
this.y=Math.random()*canvas.height;
}else{
this.x=Math.random()*canvas.width;
this.y=canvas.height+50;
}

}

this.depth=Math.random()*1.8+0.3;
this.size=this.depth*1.2;
this.opacity=0.5+Math.random()*0.5;

}

update(speed){

this.x-=speed*this.depth;
this.y-=speed*this.depth;

if(this.x<-80||this.y<-80){
this.reset(false);
}

}

draw(speed){

let trail=Math.max(0,(speed-1))*12*this.depth;

/* glow */
ctx.shadowBlur=10*this.depth;
ctx.shadowColor="white";

ctx.strokeStyle="rgba(255,255,255,"+this.opacity+")";
ctx.fillStyle="rgba(255,255,255,"+this.opacity+")";
ctx.lineWidth=this.size;

if(trail<1){

ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fill();

}else{

ctx.beginPath();
ctx.moveTo(this.x,this.y);
ctx.lineTo(this.x+trail,this.y+trail);
ctx.stroke();

}

ctx.shadowBlur=0;

}

}

for(let i=0;i<240;i++){
particles.push(new Particle());
}

function animate(){

t+=0.01;

/* سرعت پایه */
let base=0.5+(Math.sin(t)+1)*0.9;

/* burst ناگهانی */
if(Math.random()<0.002){
burst=3;
}

if(burst>0){
burst*=0.92;
}

let speed=base+burst;

ctx.fillStyle="rgba(0,0,0,0.25)";
ctx.fillRect(0,0,canvas.width,canvas.height);

drawNebula();

particles.forEach(p=>{
p.update(speed);
p.draw(speed);
});

requestAnimationFrame(animate);

}

animate();
</script>
