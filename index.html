﻿<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta name="google-site-verification" content="HTvYztTztqEIahskEYErq7mh0QlDY19aKHCwZKlEzl0" />
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS AI</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --panel: rgba(14, 14, 18, 0.86);
      --panel-strong: rgba(18, 18, 24, 0.96);
      --border: rgba(255, 255, 255, 0.09);
      --text: #ffffff;
      --muted: rgba(255, 255, 255, 0.62);
      --soft: rgba(255, 255, 255, 0.08);
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --danger: #ef4444;
      --user: linear-gradient(135deg, #2563eb, #7c3aed);
      --bot: linear-gradient(135deg, #1f2937, #111827);
    }

    body.light {
      --bg: #f5f5f7;
      --panel: rgba(255, 255, 255, 0.82);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --border: rgba(0, 0, 0, 0.1);
      --text: #101014;
      --muted: rgba(0, 0, 0, 0.58);
      --soft: rgba(0, 0, 0, 0.06);
      --bot: linear-gradient(135deg, #ffffff, #f2f2f5);
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Tahoma, sans-serif;
    }

    #grokCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      background: radial-gradient(circle at center, #111827 0%, #050505 55%, #000 100%);
    }

    .app-shell {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: row;
      backdrop-filter: blur(0px);
    }

    .main-chat {
      flex: 1;
      min-width: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(
        180deg,
        rgba(5, 5, 8, 0.38),
        rgba(5, 5, 8, 0.72)
      );
    }

    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--border);
      background: rgba(5, 5, 8, 0.42);
      backdrop-filter: blur(16px);
    }

    .top-left {
      direction: ltr;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .model-pill {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--soft);
      color: var(--text);
      font-size: 14px;
      cursor: default;
    }

    .model-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 16px rgba(124, 58, 237, 0.9);
    }

    .top-action {
      border: 1px solid var(--border);
      background: var(--soft);
      color: var(--text);
      border-radius: 999px;
      padding: 9px 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .top-action:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .brand {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .brand-title {
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(90deg, #fff, #9ca3af, #fff);
      background-size: 200%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shine 4s linear infinite;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--muted);
    }

    @keyframes shine {
      0% {
        background-position: 0%;
      }
      100% {
        background-position: 200%;
      }
    }

    .content {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    #auth {
      width: min(420px, calc(100% - 32px));
      margin: auto;
      padding: 22px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .auth-title {
      margin: 0 0 8px;
      font-size: 24px;
      text-align: center;
    }

    .auth-desc {
      margin: 0 0 12px;
      color: var(--muted);
      text-align: center;
      font-size: 14px;
      line-height: 1.8;
    }

    #auth input,
    #msgInput {
      width: 100%;
      border: 1px solid var(--border);
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      color: var(--text);
      border-radius: 14px;
      padding: 13px 14px;
      font-size: 15px;
    }

    #auth input::placeholder,
    #msgInput::placeholder {
      color: var(--muted);
    }

    button {
      font-family: inherit;
    }

    .primary-btn {
      border: none;
      border-radius: 14px;
      padding: 13px 16px;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      cursor: pointer;
      font-weight: 700;
      transition: 0.2s;
    }

    .primary-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    #chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 24px;
      display: none;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }

    .welcome {
      width: min(720px, 100%);
      margin: auto;
      text-align: center;
      color: var(--text);
      padding: 28px;
      border-radius: 26px;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.045);
      backdrop-filter: blur(12px);
    }

    .welcome h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 5vw, 46px);
    }

    .welcome p {
      margin: 0;
      color: var(--muted);
      line-height: 1.9;
    }

    .msg {
      max-width: min(760px, 82%);
      padding: 13px 15px;
      border-radius: 18px;
      line-height: 1.85;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.18);
      animation: pop 0.18s ease-out;
    }

    @keyframes pop {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--user);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bot);
      color: var(--text);
      border-bottom-left-radius: 6px;
    }

    .msg.system {
      align-self: center;
      max-width: 90%;
      background: rgba(255, 255, 255, 0.08);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
    }

    #inputArea {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 14px 18px 18px;
      border-top: 1px solid var(--border);
      background: rgba(5, 5, 8, 0.54);
      backdrop-filter: blur(18px);
    }

    .input-wrap {
      width: min(900px, 100%);
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 8px;
      background: var(--panel);
    }

    #msgInput {
      border: none;
      background: transparent;
      border-radius: 14px;
      padding: 12px;
    }

    .send-btn {
      flex: 0 0 auto;
      width: 46px;
      height: 46px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      font-size: 18px;
      transition: 0.2s;
    }

    .send-btn:hover {
      transform: scale(1.04);
    }

    .sidebar {
      width: 292px;
      height: 100vh;
      border-left: 1px solid var(--border);
      background: var(--panel-strong);
      backdrop-filter: blur(22px);
      display: flex;
      flex-direction: column;
      padding: 14px;
      gap: 12px;
    }

    .sidebar-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 0 25px rgba(124, 58, 237, 0.5);
      font-weight: 900;
    }

    .sidebar-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sidebar-name strong {
      font-size: 15px;
    }

    .sidebar-name span {
      color: var(--muted);
      font-size: 12px;
    }

    .side-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      border: 1px solid transparent;
      border-radius: 14px;
      background: transparent;
      color: var(--text);
      padding: 12px;
      text-align: right;
      cursor: pointer;
      transition: 0.18s;
      font-size: 14px;
    }

    .side-btn:hover {
      background: var(--soft);
      border-color: var(--border);
    }

    .side-btn.active {
      background: rgba(124, 58, 237, 0.16);
      border-color: rgba(124, 58, 237, 0.35);
    }

    .side-btn.danger {
      color: #fecaca;
    }

    .side-section-title {
      margin: 10px 4px 2px;
      color: var(--muted);
      font-size: 12px;
    }

    .history-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-left: 2px;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 10px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.035);
      font-size: 13px;
      line-height: 1.6;
      cursor: default;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding-top: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .user-chip {
      padding: 10px;
      border-radius: 14px;
      background: var(--soft);
      color: var(--muted);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .mobile-sidebar-toggle {
      display: none;
    }

    @media (max-width: 860px) {
      .app-shell {
        flex-direction: column;
      }

      .sidebar {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 5;
        transform: translateX(105%);
        transition: 0.24s;
        width: min(310px, 86vw);
      }

      body.sidebar-open .sidebar {
        transform: translateX(0);
      }

      .mobile-sidebar-toggle {
        display: inline-flex;
      }

      .topbar {
        padding: 0 12px;
      }

      .brand-subtitle {
        display: none;
      }

      #chat {
        padding: 16px;
      }

      .msg {
        max-width: 92%;
      }
    }
  </style>
</head>

<body>
  <canvas id="grokCanvas"></canvas>

  <div class="app-shell">
    <main class="main-chat">
      <header class="topbar">
        <div class="brand">
          <div class="brand-title">ATLAS AI</div>
          <div class="brand-subtitle">هوش مصنوعی شخصی شما</div>
        </div>

        <div class="top-left">
          <button class="top-action mobile-sidebar-toggle" onclick="toggleSidebar()">☰</button>
          <div class="model-pill">
            <span class="model-dot"></span>
            <span>Atlas Chat</span>
          </div>
          <button class="top-action" onclick="newChat()">New Chat</button>
        </div>
      </header>

      <section class="content">
        <div id="auth">
          <h2 class="auth-title">ورود به ATLAS AI</h2>
          <p class="auth-desc">
            با ایمیل و رمز وارد شو. اگر حساب نداشته باشی، به‌صورت خودکار ثبت‌نام انجام می‌شود.
          </p>

          <input id="email" type="email" placeholder="ایمیل" autocomplete="email" />
          <input id="password" type="password" placeholder="رمز عبور" autocomplete="current-password" />

          <button class="primary-btn" onclick="login()">ورود / ثبت‌نام</button>
        </div>

        <div id="chat"></div>

        <div id="inputArea">
          <div class="input-wrap">
            <input
              id="msgInput"
              type="text"
              placeholder="پیام خود را بنویسید..."
              autocomplete="off"
              onkeydown="handleInputKey(event)"
            />
            <button class="send-btn" onclick="send()" title="ارسال">➤</button>
          </div>
        </div>
      </section>
    </main>

    <aside class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-logo">
          <div class="logo-mark">A</div>
          <div class="sidebar-name">
            <strong>ATLAS AI</strong>
            <span>Workspace</span>
          </div>
        </div>
      </div>

      <button class="side-btn active" onclick="newChat()">＋ گفتگوی جدید</button>
      <button class="side-btn" onclick="loadHistory()">🕘 تاریخچه</button>
      <button class="side-btn" onclick="showSaved()">⭐ ذخیره‌شده‌ها</button>
      <button class="side-btn" onclick="showTools()">🧰 ابزارها</button>

      <div class="side-section-title">گفتگوها</div>
      <div id="historyList" class="history-list">
        <div class="history-item">بعد از ورود، پیام‌های ذخیره‌شده اینجا دیده می‌شوند.</div>
      </div>

      <div class="sidebar-footer">
        <div id="userChip" class="user-chip">وارد نشده‌اید</div>
        <button class="side-btn danger" onclick="clearChat()">🗑 پاک کردن صفحه چت</button>
        <button class="side-btn danger" onclick="logout()">⎋ خروج</button>
      </div>
    </aside>
  </div>
  
 <script>
    const SUPABASE_URL = "https://atjzqpaxdyywdwidyyvz.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF0anpxcGF4ZHl5d2R3aWR5eXZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MTgzNzYsImV4cCI6MjA5NzQ5NDM3Nn0.xfUqnGj4rByYD3ujeSNQpxpczhNZ2453FrWJ7IeY_3A";
    
    let atlasSafeClient = null;

    window.user = null;
    window.currentUser = null;

    function getSafeSupabaseConfig() {
      return {
        url: SUPABASE_URL,
        key: SUPABASE_ANON_KEY
      };
    }

    function getAtlasSafeClient() {
      if (atlasSafeClient) return atlasSafeClient;

      if (!window.supabase || !window.supabase.createClient) {
        console.error("Supabase library is not loaded.");
        return null;
      }

      const cfg = getSafeSupabaseConfig();
      atlasSafeClient = window.supabase.createClient(cfg.url, cfg.key);
      window.atlasSafeClient = atlasSafeClient;

      return atlasSafeClient;
    }

    function showAppAfterLogin() {
      const auth = document.getElementById("auth");
      const chat = document.getElementById("chat");
      const inputArea = document.getElementById("inputArea");
      const userChip = document.getElementById("userChip");

      auth.style.display = "none";
      chat.style.display = "flex";
      inputArea.style.display = "flex";

      if (window.currentUser && window.currentUser.email) {
        userChip.textContent = window.currentUser.email;
      }

      if (!chat.dataset.ready) {
        showWelcome();
        chat.dataset.ready = "true";
      }
    }

    function showWelcome() {
      const chat = document.getElementById("chat");

      if (chat.children.length > 0) return;

      const welcome = document.createElement("div");
      welcome.className = "welcome";
      welcome.innerHTML = `
        <h1>سلام، من ATLAS هستم</h1>
      `;

      chat.appendChild(welcome);
    }

    function removeWelcome() {
      const welcome = document.querySelector(".welcome");
      if (welcome) welcome.remove();
    }

    function addMsg(text, role = "bot") {
      removeWelcome();

      const chat = document.getElementById("chat");
      const msg = document.createElement("div");

      msg.className = `msg ${role}`;
      msg.textContent = text;

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;

      return msg;
    }
    window.addMsg = addMsg;

    function addSystemMsg(text) {
      const chat = document.getElementById("chat");

      if (!chat) return;

      const msg = document.createElement("div");
      msg.className = "msg system";
      msg.textContent = text;
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    async function login() {
      const client = getAtlasSafeClient();
      if (!client) return;

      try {
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");

        if (!emailInput || !passwordInput) {
          alert("فیلد ایمیل یا رمز عبور پیدا نشد.");
          return;
        }

        const email = emailInput.value.trim();
        const password = passwordInput.value.trim();

        if (!email || !password) {
          alert("ایمیل و رمز عبور را وارد کن.");
          return;
        }

        let { data, error } = await client.auth.signInWithPassword({
          email,
          password
        });

        if (error) {
          const signup = await client.auth.signUp({
            email,
            password
          });
          data = signup.data;
          error = signup.error;
        }

        if (error) {
          alert("خطا در ورود یا ثبت‌نام: " + error.message);
          return;
        }

        const loggedUser = data.session?.user || data.user;

        if (!loggedUser) {
          alert("ورود انجام شد، اما کاربر پیدا نشد. ایمیل را تایید کرده‌ای؟");
          return;
        }

        window.user = loggedUser;
        window.currentUser = loggedUser;

        showAppAfterLogin();
        await loadHistory();
        alert("خوش آمدید! ورود با موفقیت انجام شد.");
      } catch (err) {
        console.error(err);
        alert("خطا در اتصال به Supabase یا اینترنت.");
      }
    }
    window.login = login;

    async function restoreSession() {
      const client = getAtlasSafeClient();
      if (!client) return;

      try {
        const { data, error } = await client.auth.getSession();

        if (error) {
          console.error(error);
          return;
        }

        if (data && data.session && data.session.user) {
          window.user = data.session.user;
          window.currentUser = data.session.user;

          showAppAfterLogin();
          await loadHistory();
        }
      } catch (err) {
        console.error(err);
      }
    }

    async function loadHistory() {
      const client = getAtlasSafeClient();
      const activeUser = window.user || window.currentUser;

      if (!client || !activeUser || !activeUser.id) return;

      const chat = document.getElementById("chat");
      const historyList = document.getElementById("historyList");

      try {
        const { data, error } = await client
          .from("messages")
          .select("*")
          .eq("user_id", activeUser.id)
          .order("created_at", { ascending: true });

        if (error) {
          console.error(error);
          addSystemMsg("تاریخچه پیام‌ها لود نشد. جدول messages یا Policyهای Supabase را بررسی کن.");
          return;
        }

        chat.innerHTML = "";
        historyList.innerHTML = "";

        if (!data || data.length === 0) {
          showWelcome();
          historyList.innerHTML = `<div class="history-item">هنوز گفتگویی ذخیره نشده است.</div>`;
          return;
        }

        data.forEach((m) => {
          addMsg(m.text || "", m.role || "bot");
        });

        const lastMessages = data.slice(-8).reverse();

        lastMessages.forEach((m) => {
          const item = document.createElement("div");
          item.className = "history-item";
          item.textContent = m.text || "پیام بدون متن";
          historyList.appendChild(item);
        });
      } catch (err) {
        console.error(err);
        addSystemMsg("خطا در خواندن تاریخچه.");
      }
    }
    window.loadHistory = loadHistory;

    // تابع اصلی برای ارسال پیام
async function send() {
  const input = document.getElementById("msgInput");
  if (!input) return;

  const message = input.value.trim();
  if (!message) return;

  addMsg(message, "user");
  input.value = "";

  try {
    const client = getAtlasSafeClient();

    if (!client) {
      addMsg("اتصال به Supabase برقرار نیست.", "bot");
      return;
    }

    const { data, error } = await client.functions.invoke("atlas_chat", {
      body: { message: message }
    });

console.error("Edge Function Error full:", error);
console.log("error.message =", error?.message);
console.log("error.name =", error?.name);
console.log("error.context =", error?.context);
console.log("error.status =", error?.status);
console.log("error.details =", error?.details);

addMsg(
  "خطایی در پردازش پیام رخ داد: " +
  (error?.message || "unknown error"),
  "bot"
);

    if (data && data.reply) {
      addMsg(data.reply, "bot");

      if (typeof saveMsg === "function") {
        await saveMsg(message, data.reply);
      }
    } else {
      console.error("Invalid response:", data);
      addMsg("پاسخی دریافت نشد.", "bot");
    }
  } catch (err) {
    console.error("System Error:", err);
    addMsg("خطای سیستمی رخ داد.", "bot");
  }
}

window.send = send;

async function saveMsg(userText, botReply) {
  try {
    const client = getAtlasSafeClient();
    if (!client) return;

    const { data: { user }, error: userError } = await client.auth.getUser();
    if (userError) {
      console.error("خطا در گرفتن کاربر:", userError);
      return;
    }

    if (!user) {
      console.warn("کاربر لاگین نیست، پیام ذخیره نمی‌شود.");
      return;
    }

    const { error } = await client.from("messages").insert([
      {
        user_id: user.id,
        content: userText,
        reply: botReply,
        conversation_id: window.currentConversationId || null,
        created_at: new Date().toISOString()
      }
    ]);

    if (error) {
      console.error("خطا در ذخیره دیتابیس:", error);
    } else {
      console.log("پیام ذخیره شد.");
    }
  } catch (e) {
    console.error("خطای غیرمنتظره در saveMsg:", e);
  }
}

    async function generateImage() {
      const input = document.getElementById("msgInput");
      const prompt = input.value.trim();

      if (!prompt) {
        alert("لطفاً ابتدا توصیف تصویر را بنویسید.");
        return;
      }

      addMsg(prompt, "user");
      input.value = "";
      refreshHistoryPreview("🎨 تصویر: " + prompt);

      const tempMsg = addMsg("در حال ساخت تصویر... 🎨", "bot");

      try {
        const client = getAtlasSafeClient();
        const { data, error } = await client.functions.invoke('atlas-image', {
          body: { prompt: prompt }
        });

        if (error) throw error;

        tempMsg.remove();

        let imgUrl = "";
        if (data && data.url) {
          imgUrl = data.url;
        } else if (data && data.data && data.data[0] && data.data[0].b64_json) {
          imgUrl = "data:image/png;base64," + data.data[0].b64_json;
        } else if (data && data.image) {
          imgUrl = data.image;
        }

        if (imgUrl) {
          addImageMsg(imgUrl, "bot");
          await saveMsg("bot", `[تصویر تولید شده]: ${imgUrl}`);
        } else {
          addMsg("خطا: آدرس تصویر در پاسخ یافت نشد.", "bot");
        }
      } catch (err) {
        tempMsg.textContent = "خطا در تولید تصویر: " + (err.message || "خطای نامشخص");
        console.error(err);
      }
    }
    window.generateImage = generateImage;

    function addImageMsg(url, role = "bot") {

      img.src = url;
      img.style.maxWidth = "100%";
      img.style.borderRadius = "10px";
      img.style.boxShadow = "0 4px 8px rgba(0,0,0,0.2)";

      msg.appendChild(img);
      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

  <script>
    
    const canvas = document.getElementById("grokCanvas");
    const ctx = canvas.getContext("2d");

    let particles = [];
    let speed = 0.25;
    let targetSpeed = 1.4;
    let centerX = 0;
    let centerY = 0;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      centerX = canvas.width / 2;
      centerY = canvas.height / 2;
      createParticles();
    }

    window.addEventListener("resize", resizeCanvas);

    class Particle {
      constructor() {
        this.reset(true);
      }

      reset(randomPosition = false) {
        this.depth = Math.random();
        this.size = 0.45 + this.depth * 1.6;
        this.alpha = 0.18 + this.depth * 0.75;

        if (randomPosition) {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
        } else {
          this.x = canvas.width + Math.random() * 160;
          this.y = Math.random() * canvas.height + 80;
        }

        this.prevX = this.x;
        this.prevY = this.y;

        this.vx = -0.42 - this.depth * 1.15;
        this.vy = -0.18 - this.depth * 0.45;
      }

      update() {
        this.prevX = this.x;
        this.prevY = this.y;

        const dx = centerX - this.x;
        const dy = centerY - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy) || 1;
        const gravity = 0.008 + this.depth * 0.018;

        this.x += (this.vx * speed) + (dx / dist) * gravity;
        this.y += (this.vy * speed) + (dy / dist) * gravity;

        if (
          this.x < -180 ||
          this.y < -180 ||
          this.x > canvas.width + 220 ||
          this.y > canvas.height + 220
        ) {
          this.reset(false);
        }
      }

      draw() {
        const trail = 8 + this.depth * 26;

        ctx.beginPath();
        ctx.moveTo(this.prevX, this.prevY);
        ctx.lineTo(this.x + this.vx * trail, this.y + this.vy * trail);
        ctx.strokeStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.lineWidth = this.size;
        ctx.shadowBlur = 12 + this.depth * 18;
        ctx.shadowColor = "rgba(180,210,255,0.9)";
        ctx.stroke();

        ctx.shadowBlur = 0;
      }
    }

    function createParticles() {
      const count = Math.min(360, Math.max(150, Math.floor((canvas.width * canvas.height) / 6200)));
      particles = [];

      for (let i = 0; i < count; i++) {
        particles.push(new Particle());
      }
    }

    function drawNebula() {
      const gradient = ctx.createRadialGradient(
        centerX,
        centerY,
        0,
        centerX,
        centerY,
        Math.max(canvas.width, canvas.height) * 0.72
      );

      gradient.addColorStop(0, "rgba(88, 28, 135, 0.16)");
      gradient.addColorStop(0.36, "rgba(14, 116, 144, 0.08)");
      gradient.addColorStop(1, "rgba(0, 0, 0, 0)");

      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function animateSpace() {
      ctx.fillStyle = "rgba(0,0,0,0.18)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      drawNebula();

      speed += (targetSpeed - speed) * 0.018;

      if (Math.abs(targetSpeed - speed) < 0.05) {
        targetSpeed = 0.7 + Math.random() * 2.2;
      }

      for (const p of particles) {
        p.update();
        p.draw();
      }

      requestAnimationFrame(animateSpace);
    }

    resizeCanvas();
    animateSpace();

    // تابع نمایش پیام در صفحه چت
function appendMessage(role, text) {
    const chatContainer = document.getElementById('chat');
    if (!chatContainer) {
        console.error("المان chat پیدا نشد!");
        return;
    }

    // ساخت یک ظرف برای پیام
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${role}-message`; // استایل بر اساس کاربر یا بات

    // ساخت محتوای پیام
    const contentDiv = document.createElement('div');
    contentDiv.className = 'message-content';
    contentDiv.innerText = text;

    msgDiv.appendChild(contentDiv);
    chatContainer.appendChild(msgDiv);

    // اسکرول به پایین‌ترین بخش چت
    chatContainer.scrollTop = chatContainer.scrollHeight;
}

  </script>
